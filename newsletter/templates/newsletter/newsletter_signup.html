{% extends 'base.html' %}

{% block content %}

<div class="product-card">

    <!-- Page heading -->
    <h1>Newsletter Signup</h1>

    <!-- Newsletter signup form -->
    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <!-- Submit button -->
        <button type="submit" class="button">Subscribe</button>
    </form>

</div>

{% endblock %}
