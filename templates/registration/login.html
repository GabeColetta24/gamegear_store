{% extends 'base.html' %}

{% block content %}

<div class="product-card">

    <!-- Login page heading -->
    <h1>Login</h1>

    <!-- Login form using Django's built-in authentication system -->
    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="button">Login</button>

    </form>

</div>

{% endblock %}
