{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO meta description -->
    <meta name="description" content="GameGear Store - Buy gaming accessories and equipment online.">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <title>GameGear Store</title>
</head>
<body>

    <!-- Main navigation -->
    <nav>
        <!-- Homepage link -->
        <a href="/">Home</a>

        <!-- Shopping cart link -->
        <a href="{% url 'view_cart' %}">Cart</a>

        <!-- Newsletter signup link -->
        <a href="{% url 'newsletter_signup' %}">Newsletter</a>

        <!-- Show different navigation links depending on login state -->
        {% if user.is_authenticated %}

            <!-- Logout link shown to logged-in users -->
            <a href="{% url 'logout' %}">Logout</a>

        {% else %}

            <!-- Login link shown to logged-out users -->
            <a href="{% url 'login' %}">Login</a>

            <!-- Register link shown to logged-out users -->
            <a href="{% url 'register' %}">Register</a>

        {% endif %}
    </nav>

    <hr>

    <!-- Main page content -->
    {% block content %}
    {% endblock %}

</body>
</html>
