{% extends 'base.html' %}

{% block content %}

<!-- Checkout page heading -->
<h1>Checkout</h1>

<!-- Display cart items -->
<h2>Your Order</h2>

{% for item in cart_items %}

    <div>

        <p>{{ item.product.name }}</p>

        <p>Quantity: {{ item.quantity }}</p>

        <p>Subtotal: £{{ item.subtotal }}</p>

        <hr>

    </div>

{% endfor %}

<!-- Order total -->
<h2>Total: £{{ total }}</h2>

<hr>

<!-- Checkout form -->
<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Place Order</button>

</form>

{% endblock %}
